[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Per-function body size limit for the image upload endpoint.
# Netlify's default cap is 6 MB; 25 MB uploads would be rejected at the edge
# before the function runs without this override (value is in bytes).
[functions."upload-image"]
  node_bundler = "esbuild"
  body_size_limit = 26214400

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow"
    # img-src: 'self' data: blob: only — no wildcard https: (images are served from same origin)
    # object-src 'none' blocks Flash/plugins; base-uri 'self' blocks base-tag injection
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# get-image is now auth-gated; the function sets its own private Cache-Control.
# No toml override needed (and a public override here would be incorrect).
